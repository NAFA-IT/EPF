<style>
/* ── CR Page ──────────────────────────────────────────── */

.epf-cr-header{

.epf-cr-header .left .cr-title{font-size:20px;font-weight:700;color:#1A202C;}
.epf-cr-header .left .cr-meta{
  font-size:13px;color:#718096;margin-top:4px;display:flex;gap:16px;flex-wrap:wrap;
}

/* ── CR Status Badge ──────────────────────────────────── */
.epf-cr-status{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;
  margin-bottom:20px;
}
.epf-cr-status.draft         {background:#EDF2F7;color:#4A5568;}
.epf-cr-status.pending       {background:#EBF4FF;color:#2B6CB0;}
.epf-cr-status.approved      {background:#F0FFF4;color:#276749;}
.epf-cr-status.reverted      {background:#FFF5F5;color:#742A2A;}

/* ── Section List ─────────────────────────────────────── */
.epf-cr-sections{display:flex;flex-direction:column;gap:20px;margin-bottom:28px;}

.epf-cr-section{
  background:#fff;border:1px solid #E2E8F0;border-radius:10px;overflow:hidden;
}
.epf-cr-section-header{
  padding:14px 20px;background:#F7FAFC;border-bottom:1px solid #E2E8F0;
  display:flex;align-items:center;justify-content:space-between;

}
.epf-cr-section-header h4{font-size:14px;font-weight:700;color:#1A202C;margin:0;}
.epf-cr-section-header .chevron{

}
.epf-cr-section.collapsed .chevron{transform:rotate(-90deg);}
.epf-cr-section-body{padding:0;}
.epf-cr-section.collapsed .epf-cr-section-body{display:none;}

/* ── Comparison Table ─────────────────────────────────── */
.epf-compare-table{width:100%;border-collapse:collapse;}
.epf-compare-table .col-field{width:22%;background:#F7FAFC;}
.epf-compare-table .col-old  {width:39%;background:#FFF5F5;}
.epf-compare-table .col-new  {width:39%;background:#F0FFF4;}

.epf-compare-table thead th{
  padding:10px 14px;font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;border-bottom:1px solid #E2E8F0;
}
.epf-compare-table thead .th-field{color:#718096;}
.epf-compare-table thead .th-old  {color:#C53030;background:#FFF5F5;}
.epf-compare-table thead .th-new  {color:#276749;background:#F0FFF4;}

.epf-compare-table tbody td{
  padding:12px 14px;font-size:13px;vertical-align:top;
  border-bottom:1px solid #F0F4F8;
}
.epf-compare-table tbody tr:last-child td{border-bottom:none;}
.epf-compare-table .td-label{
  font-size:12px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.4px;
}
.epf-compare-table .td-old{color:#742A2A;}
.epf-compare-table .td-new{color:#276749;font-weight:600;}
.epf-compare-table .td-new.changed{background:#ECFDF5;}
.epf-compare-table .td-old.changed{background:#FFF5F5;}
.epf-compare-table .no-change{color:#A0AEC0;font-style:italic;}

/* ── Change Summary ───────────────────────────────────── */
.epf-change-summary{

/* ── No Changes ───────────────────────────────────────── */
.epf-no-sections{

}
.epf-no-sections .ns-icon{font-size:36px;margin-bottom:8px;}

/* ── Checker Remarks ─────────────────────────────────── */
.epf-cr-remarks-panel{

/* ── Action Bar (Checker only) ────────────────────────── */
.epf-cr-action-bar{

  border-top:2px solid #E2E8F0;padding:16px 0;

</style>

<!-- ── CR Page Content ───────────────────────────────────────── -->
<div class="epf-cr-wrap">

  <div class="epf-cr-header">
    <div class="left">
      <div class="cr-title">Change Request: &P_CR_REF_NO.</div>
      <div class="cr-meta">
        <span>🏢 <strong>&P_CR_COMPANY_NAME.</strong></span>

  </div>

  <div class="epf-cr-sections" id="crSections">

      ↩ Revert
    </button>

    </button>
  </div>
</div>

<!--
  ════════════════════════════════════════════════════════
  APEX CLASSIC REPORT "SQL Query" for Section Comparison
  Place in a Classic Report region on this page.
  Use "Custom" report template so you control each row HTML.
  ════════════════════════════════════════════════════════

  SQL:
  SELECT sc.SECTION_CODE, sc.SECTION_LABEL, sc.OLD_VALUES_JSON, sc.NEW_VALUES_JSON, sc.CHANGE_SUMMARY
  FROM   EPF_CR_SECTION_CHANGES sc
  WHERE  sc.CHANGE_REQ_ID = :P_CHANGE_REQ_ID
  ORDER  BY sc.DISPLAY_ORDER

  Row Template (Classic Report > Templates > Row Template 1):
  Paste the JavaScript function below into "Before Rows" template,
  then call epfRenderSection() per row from a PL/SQL region instead.
-->

<script>
/*
  epfRenderSection — call once per row from a PL/SQL Before-Header process
  that emits JavaScript, or wire it to a Classic Report "Row Template".
  Parameters come from the DB columns.
*/
function epfRenderSection(sectionCode, sectionLabel, oldJson, newJson, summary) {
    var container = document.getElementById('crSections');
    if (!container) return;

    var oldData = oldJson ? JSON.parse(oldJson) : {};
    var newData = newJson ? JSON.parse(newJson) : {};
    var allKeys = Object.keys(Object.assign({}, oldData, newData));

    var rowsHtml = allKeys.map(function(k) {
        var oldVal = oldData[k] != null ? oldData[k] : '—';
        var newVal = newData[k] != null ? newData[k] : '—';
        var changed = String(oldVal) !== String(newVal);
        var label = k.replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
        return '<tr>' +
            '<td class="td-label col-field">'  + label  + '</td>' +
            '<td class="td-old col-old' + (changed?' changed':'') + '">' + (changed ? oldVal : '<span class="no-change">unchanged</span>') + '</td>' +
            '<td class="td-new col-new' + (changed?' changed':'') + '">' + newVal + '</td>' +
            '</tr>';
    }).join('');

    var html = '<div class="epf-cr-section" id="section-' + sectionCode + '">' +
        '<div class="epf-cr-section-header" onclick="epfToggleSection(this)">' +
        '<h4>' + sectionLabel + '</h4>' +
        '<span class="chevron">▾</span>' +
        '</div>' +
        '<div class="epf-cr-section-body">' +
        '<table class="epf-compare-table"><thead><tr>' +
        '<th class="th-field col-field">Field</th>' +
        '<th class="th-old col-old">Current Value</th>' +
        '<th class="th-new col-new">Proposed Change</th>' +
        '</tr></thead><tbody>' + rowsHtml + '</tbody></table>';

    if (summary) {
        html += '<div class="epf-change-summary"><strong>Summary:</strong>' + summary + '</div>';
    }
    html += '</div></div>';

    container.insertAdjacentHTML('beforeend', html);
}

function epfToggleSection(header) {
    var section = header.closest('.epf-cr-section');
    section.classList.toggle('collapsed');
}

/* Show action bar on Checker pages */
function epfShowCheckerActions() {
    document.getElementById('crActionBar').style.display = 'flex';
}

/* Show revert remarks if present */
(function(){
    var txt = document.getElementById('crRemarksText');
    if (txt && txt.textContent.trim()) {
        document.getElementById('crRemarksPanel').style.display = 'block';
    }
})();
</script>
